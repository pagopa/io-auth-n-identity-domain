name: Deploy (io-session-manager-oi-1)

on:
  workflow_dispatch:

jobs:
  deploy_to_azure_sm-oi_1:
    name: Deploy to Azure App Service SM-OI 1
    uses: pagopa/dx/.github/workflows/release-azure-appsvc-v1.yaml@main
    with:
      # '-cd' suffix added inside the pipeline
      environment: app-prod
      resource_group_name: "io-p-int-session-manager-rg-01"
      workspace_name: "io-session-manager-oi"
      web_app_name: "io-p-int-session-manager-oi-app-01"
      use_private_agent: true
      disable_auto_staging_deploy: true
    secrets: inherit
    permissions:
      attestations: write
      contents: read
      id-token: write
