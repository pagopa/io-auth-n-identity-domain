name: Deploy (io-fast-login)

on:
  workflow_dispatch:

jobs:
  deploy_to_azure:
    name: Deploy to Azure Function App
    uses: pagopa/dx/.github/workflows/release-azure-appsvc-v1.yaml@76fa9d0cf942bdc2fb5f74853e271511a48269c4
    with:
      # '-cd' suffix added inside the pipeline
      environment: app-prod
      resource_group_name: "io-p-itn-auth-lv-rg-01"
      workspace_name: "io-fast-login"
      web_app_name: "io-p-itn-auth-lv-func-02"
      disable_auto_staging_deploy: false
      use_private_agent: true
    secrets: inherit
    permissions:
      attestations: write
      contents: read
      id-token: write
