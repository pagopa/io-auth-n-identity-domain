openapi: 3.1.0
info:
  description: Session Manager One Identity
  license:
    identifier: MIT
    name: MIT
  title: session-manager-oi
  version: 0.0.1
security: []
servers:
  - description: Local development server
    url: http://localhost:7071
components:
  securitySchemes:
    functionKey:
      description: Azure Functions host key passed as the `x-functions-key` header.
      in: header
      name: x-functions-key
      type: apiKey
  schemas:
    ProblemDetails:
      type: object
      properties:
        detail:
          type: string
        status:
          type: integer
        title:
          type: string
        type:
          type: string
          format: uri
      required:
        - detail
        - status
        - title
        - type
      description: "RFC 7807 Problem Details for HTTP APIs. See https://tools.ietf.org/html/rfc7807. Base URL: https://ioapp.it/problems/"
  parameters: {}
paths: {}
webhooks: {}
